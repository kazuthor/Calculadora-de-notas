<!DOCTYPE html>
<html>
<head>
    <title>Calculadora de Promedio</title>
</head>
<body>

    <h1>Calculadora de Promedio</h1>

    <input type="number" id="n1" placeholder="Nota 1"><br><br>
    <input type="number" id="n2" placeholder="Nota 2"><br><br>
    <input type="number" id="n3" placeholder="Nota 3"><br><br>

    <button onclick="calcular()">Calcular</button>

    <h2 id="resultado"></h2>

    <script>
        function calcular() {
            let n1 = parseFloat(document.getElementById("n1").value);
            let n2 = parseFloat(document.getElementById("n2").value);
            let n3 = parseFloat(document.getElementById("n3").value);

            let promedio = (n1 + n2 + n3) / 3;

            document.getElementById("resultado").innerHTML =
            "Promedio: " + promedio.toFixed(2);
        }
    </script>

</body>
</html>
